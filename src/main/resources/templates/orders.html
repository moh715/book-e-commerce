<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Orders — Maktabtna</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f6f9; }
        .navbar-brand { font-weight: 700; font-size: 1.4rem; }
        .navbar-brand span { color: #e74c3c; }
        .order-card { border: none; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
        .order-header { background: #2c3e50; color: #fff; border-radius: 10px 10px 0 0; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" th:href="@{/books}">Book<span>Verse</span></a>
    <div class="ms-auto d-flex gap-2">
        <a th:href="@{/books}" class="btn btn-outline-light btn-sm">Browse Books</a>
        <a th:href="@{/cart}" class="btn btn-outline-light btn-sm">🛒 Cart</a>
        <form th:action="@{/logout}" method="post" class="m-0">
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-5" style="max-width:700px;">
    <h2 class="mb-4"> My Orders</h2>


    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>


    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
        <p class="fs-5 text-muted">You haven't placed any orders yet.</p>
        <a th:href="@{/books}" class="btn btn-danger">Start Shopping</a>
    </div>

    <div class="order-card card mb-4" th:each="order : ${orders}">
        <div class="order-header p-3 d-flex justify-content-between">
            <div>
                <span class="fw-semibold">Order #<span th:text="${order.id}"></span></span>
                <span class="ms-3 text-white-50 small" th:text="${order.orderDate}"></span>
            </div>
            <div class="fw-bold"
                 th:text="|Total: ${#numbers.formatDecimal(order.totalPrice,1,2)}|"></div>
        </div>

        <div class="p-3">
            <table class="table table-sm mb-0">
                <thead>
                    <tr><th>Book</th><th>Qty</th><th>Unit Price</th><th>Subtotal</th></tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${order.items}">
                        <td th:text="${item.bookTitle}"></td>
                        <td th:text="${item.quantity}"></td>
                        <td th:text="|${#numbers.formatDecimal(item.unitPrice,1,2)}|"></td>
                        <td th:text="|${#numbers.formatDecimal(item.unitPrice * item.quantity,1,2)}|"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
