<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cart — Maktabtna</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f6f9; }
        .navbar-brand { font-weight: 700; font-size: 1.4rem; }
        .navbar-brand span { color: #e74c3c; }
        .cart-card { border: none; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
        .price-tag { font-size: 1.1rem; font-weight: 700; color: #e74c3c; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" th:href="@{/books}">Book<span>Verse</span></a>
    <div class="ms-auto d-flex gap-2 align-items-center">
        <a th:href="@{/books}" class="btn btn-outline-light btn-sm">Browse Books</a>
        <a th:href="@{/orders}" class="btn btn-outline-light btn-sm">My Orders</a>
        <form th:action="@{/logout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-5" style="max-width: 800px;">
    <h2 class="mb-4">🛒 My Cart</h2>

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Empty cart message -->
    <div th:if="${#lists.isEmpty(cart.items)}" class="text-center py-5">
        <p class="fs-5 text-muted">Your cart is empty.</p>
        <a th:href="@{/books}" class="btn btn-danger">Browse Books</a>
    </div>

    <!-- Cart items table -->
    <div th:if="${!#lists.isEmpty(cart.items)}" class="card cart-card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Book</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Subtotal</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cart.items}">
                    <td class="align-middle fw-semibold" th:text="${item.book.title}"></td>
                    <td class="align-middle" th:text="|${#numbers.formatDecimal(item.book.price,1,2)}|"></td>

                    <!-- Update quantity form -->
                    <td class="align-middle">
                        <form th:action="@{/cart/update}" method="post" class="d-flex gap-1 align-items-center">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="cartItemId" th:value="${item.id}">
                            <input type="number" name="quantity" th:value="${item.quantity}"
                                   min="1" class="form-control form-control-sm" style="width: 70px;">
                            <button type="submit" class="btn btn-sm btn-outline-secondary">Update</button>
                        </form>
                    </td>

                    <td class="align-middle price-tag"
                        th:text="|${#numbers.formatDecimal(item.book.price * item.quantity,1,2)}|"></td>

                    <!-- Remove item form -->
                    <td class="align-middle">
                        <form th:action="@{/cart/remove}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="cartItemId" th:value="${item.id}">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Remove</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Cart total and checkout button -->
        <div class="card-footer d-flex justify-content-between align-items-center bg-white py-3 px-4">
            <div class="fs-5">
                Total: <span class="price-tag" th:text="|${#numbers.formatDecimal(total,1,2)}|"></span>
            </div>
            <a th:href="@{/checkout}" class="btn btn-danger btn-lg">Proceed to Checkout</a>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
