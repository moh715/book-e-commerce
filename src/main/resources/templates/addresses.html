<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Addresses — Maktabtna</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f6f9; }
        .navbar-brand { font-weight: 700; font-size: 1.4rem; }
        .navbar-brand span { color: #e74c3c; }
        .field-error { font-size: .85rem; color: #dc3545; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" th:href="@{/books}">Book<span>Verse</span></a>
    <div class="ms-auto d-flex gap-2">
        <a th:href="@{/books}" class="btn btn-outline-light btn-sm">Browse Books</a>
        <a th:href="@{/cart}" class="btn btn-outline-light btn-sm">🛒 Cart</a>
        <a th:href="@{/orders}" class="btn btn-outline-light btn-sm">My Orders</a>
        <form th:action="@{/logout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-5" style="max-width: 700px;">
    <h2 class="mb-4">My Addresses</h2>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

    <!-- Add address form -->
    <div class="card mb-4 p-4" style="border:none; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.08);">
        <h5 class="mb-3">Add New Address</h5>
        <form th:action="@{/addresses/add}" method="post" th:object="${addressRequest}" class="row g-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="col-12">
                <label class="form-label">Full Name</label>
                <input type="text" th:field="*{fullName}" class="form-control"
                       th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'" placeholder="John Doe">
                <div class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
            </div>

            <div class="col-12">
                <label class="form-label">Street</label>
                <input type="text" th:field="*{street}" class="form-control"
                       th:classappend="${#fields.hasErrors('street')} ? 'is-invalid'" placeholder="123 Main St">
                <div class="field-error" th:if="${#fields.hasErrors('street')}" th:errors="*{street}"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label">City</label>
                <input type="text" th:field="*{city}" class="form-control"
                       th:classappend="${#fields.hasErrors('city')} ? 'is-invalid'" placeholder="Cairo">
                <div class="field-error" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label">State / Province</label>
                <input type="text" th:field="*{state}" class="form-control"
                       th:classappend="${#fields.hasErrors('state')} ? 'is-invalid'" placeholder="Cairo Governorate">
                <div class="field-error" th:if="${#fields.hasErrors('state')}" th:errors="*{state}"></div>
            </div>



            <div class="col-md-6">
                <label class="form-label">Country</label>
                <input type="text" th:field="*{country}" class="form-control"
                       th:classappend="${#fields.hasErrors('country')} ? 'is-invalid'" placeholder="Egypt">
                <div class="field-error" th:if="${#fields.hasErrors('country')}" th:errors="*{country}"></div>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-danger px-4">Save Address</button>
            </div>
        </form>
    </div>

    <!-- Saved addresses list -->
    <h5 class="mb-3">Saved Addresses</h5>

    <div th:if="${#lists.isEmpty(addresses)}" class="text-muted">No addresses saved yet.</div>

    <div class="card mb-3" th:each="addr : ${addresses}"
         style="border:none; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.07);">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <strong th:text="${addr.fullName}"></strong><br>
                <span class="text-muted small"
                      th:text="|${addr.street}, ${addr.city}, ${addr.state} ${addr.zipCode}, ${addr.country}|">
                </span>
            </div>
            <form th:action="@{/addresses/delete/{id}(id=${addr.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-sm btn-outline-danger"
                        onclick="return confirm('Remove this address?')">Remove</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
