<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login — Maktabtna</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f6f9; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
        .brand { font-size: 1.8rem; font-weight: 700; color: #2c3e50; }
        .brand span { color: #e74c3c; }
    </style>
</head>
<body>
<div class="d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card p-5" style="width:100%; max-width:420px;">

        <div class="text-center mb-4">
            <div class="brand">Book<span>Verse</span></div>
            <p class="text-muted mt-1">Sign in to your account</p>
        </div>


        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>


        <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <label for="email" class="form-label fw-semibold">Email address</label>
                <input type="email" id="email" name="email"
                       class="form-control form-control-lg"
                       placeholder="you@example.com" required autofocus>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Password</label>
                <input type="password" id="password" name="password"
                       class="form-control form-control-lg"
                       placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-danger btn-lg w-100">Sign In</button>
        </form>

        <hr class="my-4">
        <p class="text-center mb-0">
            Don't have an account?
            <a th:href="@{/register}" class="text-decoration-none fw-semibold">Create one</a>
        </p>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
