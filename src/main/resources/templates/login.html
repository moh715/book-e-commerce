<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Login - MAKTABTNA</title>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container">
<div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
<div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>
<form th:action="@{/login}" method="post">
<input type="email" name="email" class="form-control" placeholder="Email"
required>
<input type="password" name="password" class="form-control" placeholder="Password"
required>
<button type="submit" class="btn btn-primary">Sign In</button>
</form>
<a th:href="@{/register}">Don't have an account? Register</a>
</div>
</body>
</html>
