<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register — Maktabtna</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f6f9; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
        .brand { font-size: 1.8rem; font-weight: 700; color: #2c3e50; }
        .brand span { color: #e74c3c; }
        .field-error { font-size: .85rem; color: #dc3545; }
    </style>
</head>
<body>
<div class="d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card p-5" style="width:100%; max-width:460px;">

        <div class="text-center mb-4">
            <div class="brand">Book<span>Verse</span></div>
            <p class="text-muted mt-1">Create your account</p>
        </div>

        <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

        <form th:action="@{/register}" method="post" th:object="${registerRequest}" novalidate>

            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Username</label>
                <input type="text" id="username" th:field="*{username}"
                       class="form-control form-control-lg"
                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                       placeholder="johndoe" required>
                <div class="field-error" th:if="${#fields.hasErrors('username')}"
                     th:errors="*{username}"></div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email address</label>
                <input type="email" id="email" th:field="*{email}"
                       class="form-control form-control-lg"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                       placeholder="you@example.com" required>
                <div class="field-error" th:if="${#fields.hasErrors('email')}"
                     th:errors="*{email}"></div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Password</label>
                <input type="password" id="password" th:field="*{password}"
                       class="form-control form-control-lg"
                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                       placeholder="At least 6 characters" required>
                <div class="field-error" th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}"></div>
            </div>

            <button type="submit" class="btn btn-danger btn-lg w-100">Create Account</button>
        </form>

        <hr class="my-4">
        <p class="text-center mb-0">
            Already have an account?
            <a th:href="@{/login}" class="text-decoration-none fw-semibold">Sign in</a>
        </p>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
