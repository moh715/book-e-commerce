<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Categories — Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>body { background: #f4f6f9; }</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" th:href="@{/admin}">Admin Panel</a>
    <div class="ms-auto d-flex gap-2">
        <a th:href="@{/admin/books}" class="btn btn-outline-light btn-sm">Books</a>
        <a th:href="@{/admin/categories}" class="btn btn-outline-light btn-sm">Categories</a>
        <a th:href="@{/admin/users}" class="btn btn-outline-light btn-sm">Users</a>
        <a th:href="@{/admin/orders}" class="btn btn-outline-light btn-sm">Orders</a>
        <form th:action="@{/logout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-5" style="max-width: 700px;">
    <h2 class="mb-4">Manage Categories</h2>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <!-- Add category form -->
    <div class="card mb-4 p-4" style="border:none; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.08);">
        <h5 class="mb-3">Add New Category</h5>
        <form th:action="@{/admin/categories/add}" method="post" class="d-flex gap-2">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="text" name="name" class="form-control" placeholder="Category name" required>
            <button type="submit" class="btn btn-danger px-4">Add</button>
        </form>
    </div>

    <!-- Categories list -->
    <div class="card" style="border:none; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.08);">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr><th>#</th><th>Category Name</th><th>Action</th></tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(categories)}">
                        <td colspan="3" class="text-center text-muted py-3">No categories yet.</td>
                    </tr>
                    <tr th:each="cat : ${categories}">
                        <td th:text="${cat.id}"></td>
                        <td th:text="${cat.name}"></td>
                        <td>
                            <form th:action="@{/admin/categories/delete/{id}(id=${cat.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Delete this category?')">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
