<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Users — Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>body { background: #f4f6f9; }</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" th:href="@{/admin}">Admin Panel</a>
    <div class="ms-auto d-flex gap-2">
        <a th:href="@{/admin/books}" class="btn btn-outline-light btn-sm">Books</a>
        <a th:href="@{/admin/categories}" class="btn btn-outline-light btn-sm">Categories</a>
        <a th:href="@{/admin/users}" class="btn btn-outline-light btn-sm">Users</a>
        <a th:href="@{/admin/orders}" class="btn btn-outline-light btn-sm">Orders</a>
        <form th:action="@{/logout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-5">
    <h2 class="mb-4">All Users</h2>

    <div class="card" style="border:none; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.08);">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr><th>#</th><th>Username</th><th>Email</th><th>Role</th></tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="4" class="text-center text-muted py-3">No users found.</td>
                    </tr>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.username}"></td>
                        <td th:text="${user.email}"></td>
                        <td>
                            <span class="badge bg-danger" th:if="${user.role == 'ROLE_ADMIN'}">Admin</span>
                            <span class="badge bg-secondary" th:unless="${user.role == 'ROLE_ADMIN'}">User</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
