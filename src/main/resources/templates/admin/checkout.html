<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout — Maktabtna</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f6f9; }
        .navbar-brand { font-weight: 700; font-size: 1.4rem; }
        .navbar-brand span { color: #e74c3c; }
        .checkout-card { border: none; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
        .price-tag { font-weight: 700; color: #e74c3c; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" th:href="@{/books}">Book<span>Verse</span></a>
    <div class="ms-auto d-flex gap-2">
        <a th:href="@{/cart}" class="btn btn-outline-light btn-sm">🛒 Back to Cart</a>
        <form th:action="@{/logout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-5" style="max-width: 750px;">
    <h2 class="mb-4">Checkout</h2>

    <!-- Order summary -->
    <div class="card checkout-card mb-4">
        <div class="card-header bg-dark text-white" style="border-radius:10px 10px 0 0;">
            <strong>Order Summary</strong>
        </div>
        <div class="card-body p-0">
            <table class="table table-sm mb-0">
                <thead><tr><th>Book</th><th>Qty</th><th>Subtotal</th></tr></thead>
                <tbody>
                <tr th:each="item : ${cart.items}">
                    <td th:text="${item.book.title}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="|${#numbers.formatDecimal(item.book.price * item.quantity,1,2)}|"></td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer d-flex justify-content-end bg-white">
            <span class="fs-5">Total: <span class="price-tag" th:text="|${#numbers.formatDecimal(total,1,2)}|"></span></span>
        </div>
    </div>

    <!-- Address selection form -->
    <div class="card checkout-card">
        <div class="card-body p-4">
            <h5 class="mb-3">Select Shipping Address</h5>

            <div th:if="${#lists.isEmpty(addresses)}" class="alert alert-warning">
                You have no saved addresses.
                <a th:href="@{/addresses}" class="alert-link">Add one here</a> before checking out.
            </div>

            <form th:action="@{/checkout/confirm}" method="post" th:object="${checkoutRequest}"
                  th:if="${!#lists.isEmpty(addresses)}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-4">
                    <div th:each="addr : ${addresses}" class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="addressId"
                               th:value="${addr.id}" th:id="|addr_${addr.id}|" required>
                        <label class="form-check-label" th:for="|addr_${addr.id}|"
                               th:text="|${addr.fullName}, ${addr.street}, ${addr.city}, ${addr.state} ${addr.zipCode}, ${addr.country}|">
                        </label>
                    </div>
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('addressId')}" th:errors="*{addressId}"></div>
                </div>

                <div class="d-flex justify-content-between align-items-center">
                    <a th:href="@{/addresses}" class="btn btn-outline-secondary">+ Add New Address</a>
                    <button type="submit" class="btn btn-danger btn-lg px-5">Place Order</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
