<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard — Maktabtna</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f6f9; }
        .navbar-brand { font-weight: 700; font-size: 1.4rem; }
        .stat-card { border: none; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" th:href="@{/admin}">Admin Panel</a>
    <div class="ms-auto d-flex gap-2">
        <a th:href="@{/admin/books}" class="btn btn-outline-light btn-sm">Books</a>
        <a th:href="@{/admin/categories}" class="btn btn-outline-light btn-sm">Categories</a>
        <a th:href="@{/admin/users}" class="btn btn-outline-light btn-sm">Users</a>
        <a th:href="@{/admin/orders}" class="btn btn-outline-light btn-sm">Orders</a>
        <form th:action="@{/logout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-5">
    <h2 class="mb-4">Dashboard</h2>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

    <div class="row g-4">
        <div class="col-md-3">
            <div class="card stat-card text-center p-4">
                <div class="display-6 fw-bold text-danger" th:text="${totalBooks}">0</div>
                <div class="text-muted mt-1">Books</div>
                <a th:href="@{/admin/books}" class="btn btn-outline-danger btn-sm mt-3">Manage</a>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card text-center p-4">
                <div class="display-6 fw-bold text-primary" th:text="${totalUsers}">0</div>
                <div class="text-muted mt-1">Users</div>
                <a th:href="@{/admin/users}" class="btn btn-outline-primary btn-sm mt-3">View</a>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card text-center p-4">
                <div class="display-6 fw-bold text-success" th:text="${totalOrders}">0</div>
                <div class="text-muted mt-1">Orders</div>
                <a th:href="@{/admin/orders}" class="btn btn-outline-success btn-sm mt-3">View</a>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card text-center p-4">
                <div class="display-6 fw-bold text-warning" th:text="${totalCategories}">0</div>
                <div class="text-muted mt-1">Categories</div>
                <a th:href="@{/admin/categories}" class="btn btn-outline-warning btn-sm mt-3">Manage</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
