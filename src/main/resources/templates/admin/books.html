<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Books — Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>body { background: #f4f6f9; } .field-error { font-size: .85rem; color: #dc3545; }</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" th:href="@{/admin}">Admin Panel</a>
    <div class="ms-auto d-flex gap-2">
        <a th:href="@{/admin/books}" class="btn btn-outline-light btn-sm">Books</a>
        <a th:href="@{/admin/categories}" class="btn btn-outline-light btn-sm">Categories</a>
        <a th:href="@{/admin/users}" class="btn btn-outline-light btn-sm">Users</a>
        <a th:href="@{/admin/orders}" class="btn btn-outline-light btn-sm">Orders</a>
        <form th:action="@{/logout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-5">
    <h2 class="mb-4">Manage Books</h2>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

    <!-- Add book form -->
    <div class="card mb-4 p-4" style="border:none; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.08);">
        <h5 class="mb-3">Add New Book</h5>
        <form th:action="@{/admin/books/add}" method="post" th:object="${bookRequest}" class="row g-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="col-md-6">
                <label class="form-label">Title</label>
                <input type="text" th:field="*{title}" class="form-control"
                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'" placeholder="Book title" required>
                <div class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label">Author</label>
                <input type="text" th:field="*{author}" class="form-control"
                       th:classappend="${#fields.hasErrors('author')} ? 'is-invalid'" placeholder="Author name" required>
                <div class="field-error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></div>
            </div>

            <div class="col-md-3">
                <label class="form-label">Price ($)</label>
                <input type="number" step="0.01" th:field="*{price}" class="form-control"
                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'" placeholder="e.g. 19.99" required>
                <div class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>

            <div class="col-md-3">
                <label class="form-label">Stock</label>
                <input type="number" th:field="*{stock}" class="form-control"
                       th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid'" placeholder="e.g. 50" required>
                <div class="field-error" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label">Image URL (optional)</label>
                <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="https://...">
            </div>

            <div class="col-md-6">
                <label class="form-label">Category</label>
                <select th:field="*{categoryId}" class="form-select">
                    <option value="">-- No category --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"></option>
                </select>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-danger px-4">Add Book</button>
            </div>
        </form>
    </div>

    <!-- Books table -->
    <div class="card" style="border:none; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.08);">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr><th>#</th><th>Title</th><th>Author</th><th>Price</th><th>Stock</th><th>Category</th><th>Action</th></tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(books)}">
                        <td colspan="7" class="text-center text-muted py-3">No books yet.</td>
                    </tr>
                    <tr th:each="book : ${books}">
                        <td th:text="${book.id}"></td>
                        <td th:text="${book.title}"></td>
                        <td th:text="${book.author}"></td>
                        <td th:text="|${#numbers.formatDecimal(book.price,1,2)}|"></td>
                        <td th:text="${book.stock}"></td>
                        <td th:text="${book.category != null ? book.category.name : '-'}"></td>
                        <td>
                            <form th:action="@{/admin/books/delete/{id}(id=${book.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Delete this book?')">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
