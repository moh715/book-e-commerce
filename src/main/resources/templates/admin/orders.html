<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orders — Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>body { background: #f4f6f9; }</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" th:href="@{/admin}">Admin Panel</a>
    <div class="ms-auto d-flex gap-2">
        <a th:href="@{/admin/books}" class="btn btn-outline-light btn-sm">Books</a>
        <a th:href="@{/admin/categories}" class="btn btn-outline-light btn-sm">Categories</a>
        <a th:href="@{/admin/users}" class="btn btn-outline-light btn-sm">Users</a>
        <a th:href="@{/admin/orders}" class="btn btn-outline-light btn-sm">Orders</a>
        <form th:action="@{/logout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-5">
    <h2 class="mb-4">All Orders</h2>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5 text-muted">No orders yet.</div>

    <div class="card mb-4" th:each="order : ${orders}"
         style="border:none; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.08);">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center"
             style="border-radius:10px 10px 0 0;">
            <div>
                <span class="fw-semibold">Order #<span th:text="${order.id}"></span></span>
                <span class="ms-3 text-white-50 small" th:text="${order.orderDate}"></span>
                <span class="ms-3 small" th:text="${order.user.username}"></span>
            </div>
            <div class="fw-bold" th:text="|Total: $${#numbers.formatDecimal(order.totalPrice,1,2)}|"></div>
        </div>
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <table class="table table-sm mb-0">
                        <thead><tr><th>Book</th><th>Qty</th><th>Unit Price</th></tr></thead>
                        <tbody>
                            <tr th:each="item : ${order.items}">
                                <td th:text="${item.book.title}"></td>
                                <td th:text="${item.quantity}"></td>
                                <td th:text="|$${#numbers.formatDecimal(item.priceAtPurchase,1,2)}|"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="col-md-4">
                    <!-- Update status form -->
                    <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post" class="d-flex gap-2">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <select name="status" class="form-select form-select-sm">
                            <option value="PENDING"   th:selected="${order.status == 'PENDING'}">PENDING</option>
                            <option value="SHIPPED"   th:selected="${order.status == 'SHIPPED'}">SHIPPED</option>
                            <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">DELIVERED</option>
                            <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">CANCELLED</option>
                        </select>
                        <button type="submit" class="btn btn-sm btn-danger">Update</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
