<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Error — Maktabtna</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f6f9; }
        .error-container { text-align: center; padding: 60px 20px; }
        .error-code { font-size: 4rem; font-weight: 700; color: #e74c3c; }
        .error-message { font-size: 1.2rem; color: #555; margin: 20px 0; }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-code">⚠️ Error</div>
    <p class="error-message" th:if="${errorMsg != null}" th:text="${errorMsg}">An error occurred</p>
    <p class="error-message" th:if="${errorMsg == null}">Something went wrong. Please try again.</p>
    <a href="/" class="btn btn-primary">Go Home</a>
</div>
</body>
</html>
