<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Browse Books — Maktabtna</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f6f9; }
        .navbar-brand { font-weight: 700; font-size: 1.4rem; }
        .navbar-brand span { color: #e74c3c; }
        .book-card { border: none; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.08); transition: transform .2s; }
        .book-card:hover { transform: translateY(-4px); }
        .badge-category { background: #e8f0fe; color: #3d5afe; font-size: .75rem; border-radius: 20px; }
        .price-tag { font-size: 1.2rem; font-weight: 700; color: #e74c3c; }
        .stock-low { color: #e67e22; font-size: .85rem; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" th:href="@{/books}">Book<span>Verse</span></a>
    <div class="ms-auto d-flex gap-2 align-items-center">
        <a th:href="@{/cart}" class="btn btn-outline-light btn-sm">🛒 Cart</a>
        <a th:href="@{/orders}" class="btn btn-outline-light btn-sm">My Orders</a>
        <form th:action="@{/logout}" method="post" class="m-0">
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-5">

    <!-- Flash messages -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search bar -->
    <form th:action="@{/books}" method="get" class="row g-2 mb-4">
        <div class="col-md-8">
            <input type="text" name="search" class="form-control form-control-lg"
                   th:value="${search}" placeholder="Search by title…">
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-dark btn-lg w-100">Search</button>
        </div>
        <div class="col-md-2" th:if="${search != null}">
            <a th:href="@{/books}" class="btn btn-outline-secondary btn-lg w-100">Clear</a>
        </div>
    </form>

    <!-- Result count -->
    <p class="text-muted mb-3" th:text="|${#lists.size(books)} book(s) found|"></p>

    <!-- No results -->
    <div th:if="${#lists.isEmpty(books)}" class="text-center py-5">
        <h4 class="text-muted">No books found.</h4>
    </div>

    <!-- Book grid -->
    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="book : ${books}">
            <div class="card book-card h-100 p-3">
                <!-- Cover image -->
                <img th:if="${book.imageUrl != null and !#strings.isEmpty(book.imageUrl)}"
                     th:src="${book.imageUrl}" class="card-img-top rounded mb-2"
                     style="height:180px; object-fit:cover;" th:alt="${book.title}">
                <div th:unless="${book.imageUrl != null and !#strings.isEmpty(book.imageUrl)}"
                     class="d-flex align-items-center justify-content-center bg-light rounded mb-2"
                     style="height:180px; font-size:3rem;">📚</div>

                <div class="card-body p-1">
                    <!-- Category badge -->
                    <span th:if="${book.categoryName != null}"
                          class="badge badge-category mb-1"
                          th:text="${book.categoryName}"></span>

                    <h5 class="card-title mb-1" th:text="${book.title}"></h5>
                    <p class="text-muted small mb-2" th:text="${book.author}"></p>
                    <div class="price-tag mb-1" th:text="|${#numbers.formatDecimal(book.price,1,2)}|"></div>

                    <p class="stock-low" th:if="${book.stock != null and book.stock < 5}"
                       th:text="|Only ${book.stock} left!|"></p>
                    <p class="text-muted small" th:if="${book.stock != null and book.stock >= 5}"
                       th:text="|In stock: ${book.stock}|"></p>
                </div>

                <!-- Add to cart form -->
                <form th:action="@{/add-to-cart}" method="post" class="px-1 pb-2 d-flex gap-2">
                    <input type="hidden" name="bookId" th:value="${book.id}">
                    <input type="number" name="quantity" value="1" min="1" th:max="${book.stock}"
                           class="form-control form-control-sm" style="width:70px;">
                    <button type="submit" class="btn btn-danger btn-sm flex-grow-1"
                            th:disabled="${book.stock == null or book.stock == 0}">
                        Add to Cart
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
