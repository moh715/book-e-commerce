# ============================================================
# Database Configuration
# Change these values to match your local MySQL setup
# ============================================================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bookecommerce
spring.datasource.username=root
spring.datasource.password=NewPassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate will auto-create/update tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ============================================================
# Email Configuration (optional feature)
# Replace with your Gmail app password to enable order emails
# The app still works if email is not configured
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Short timeouts so a bad email config doesn't hang the app
spring.mail.properties.mail.smtp.connectiontimeout=3000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=3000
